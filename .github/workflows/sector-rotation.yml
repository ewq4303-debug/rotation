name: sector-rotation

on:
  schedule:
    # 14:30 UTC = 22:30 台北（週一~週五），FinMind 約 21:00 更新完才跑
    - cron: '30 14 * * 1-5'
  workflow_dispatch:        # 也可手動觸發

permissions:
  contents: write           # 允許把 rrg_data.json commit 回 repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install requests pandas numpy

      - name: Run RRG
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}   # 在 repo Settings > Secrets 設定
        run: python sector_rotation.py

      - name: Commit result
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rrg_data.json
          git commit -m "update rrg_data $(date -u +%F)" || echo "no change"
          git push
